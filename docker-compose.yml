services:
  app:
    image: ghcr.io/junzh0u/bunnylol:latest
    restart: always
    command: "-port=${PORT:-4000}"
    environment:
      BUNNYLOL_CONFIG: /app/config/config.json
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    volumes:
      # Directory (not single-file) mount so the config watcher sees hot-reload
      # updates. Kept in sync across hosts by dotfiles (~/.config -> ~/.dotfiles/.config).
      - ${HOME}/.config/bunnylol:/app/config:ro
